# Golden Answers — ChatBI 基准测试标准答案
#
# L1: 基础查询（1-2 表，简单 SQL）
# L2: 进阶查询（2-3 表，窗口函数）
# L3: 中级分析（3-4 表，基础算法）
#
# 三级对比：
#   Level 1 — SQL 语义等价（LLM Judge）
#   Level 2 — 数值范围对比（min/max）
#   Level 3 — 分析结论关键词覆盖（LLM Judge）

questions:

  # ===========================================================================
  # L1 — 基础查询（20 题）
  # ===========================================================================

  # --- 跨领域综合分析（3 题）---
  - id: "L1-01"
    level: 1
    question: "2023年哪些省份的经济总量最大？帮我列出GDP最高的前3个省份，同时看看它们的人均GDP大概是多少。"
    expected_analysis_type: "detail"
    expected_indicators: ["gdp", "per_capita_gdp"]
    expected_tables: ["economic_indicator_data", "admin_region_data"]
    expected_sql: "SELECT a.province_name, e.gdp, e.per_capita_gdp\nFROM economic_indicator_data e\nJOIN admin_region_data a ON e.区划ID = a.区划ID\nWHERE e.统计年份 = '2023'\nORDER BY e.gdp DESC\nLIMIT 3"
    expected_ranges:
      gdp: {min: 0}
      per_capita_gdp: {min: 0}
      table_rows: {min: 1, max: 3}
    expected_keywords: ["GDP最高", "前3", "人均GDP", "2023年", "经济总量"]

  - id: "L1-02"
    level: 1
    question: "我想看看2022年环境比较好的省份是不是森林覆盖率也高。请帮我列出森林覆盖率排前5的省份，同时看看它们的空气质量（AQI）情况。"
    expected_analysis_type: "detail"
    expected_indicators: ["forest_coverage", "aqi"]
    expected_tables: ["env_monitor_data", "admin_region_data"]
    expected_sql: "SELECT a.province_name, e.forest_coverage, e.aqi\nFROM env_monitor_data e\nJOIN admin_region_data a ON e.区划ID = a.区划ID\nWHERE e.统计年份 = '2022'\nORDER BY e.forest_coverage DESC\nLIMIT 5"
    expected_ranges:
      forest_coverage: {min: 0}
      aqi: {min: 0}
      table_rows: {min: 1, max: 5}
    expected_keywords: ["森林覆盖率", "前5", "AQI", "空气质量", "2022年"]

  - id: "L1-03"
    level: 1
    question: "2023年，经济最强和最弱的省份，它们的就业情况差别有多大？帮我分别列出GDP最高和最低的3个省份，看看它们的失业率分别是多少。"
    expected_analysis_type: "detail"
    expected_indicators: ["gdp", "unemployment_rate"]
    expected_tables: ["economic_indicator_data", "employment_data", "admin_region_data"]
    expected_sql: "SELECT a.province_name, e.gdp, emp.unemployment_rate\nFROM economic_indicator_data e\nJOIN employment_data emp ON e.区划ID = emp.区划ID AND e.统计年份 = emp.统计年份\nJOIN admin_region_data a ON e.区划ID = a.区划ID\nWHERE e.统计年份 = '2023'\nORDER BY e.gdp DESC\nLIMIT 3"
    expected_ranges:
      gdp: {min: 0}
      unemployment_rate: {min: 0}
      table_rows: {min: 1, max: 6}
    expected_keywords: ["GDP最高", "GDP最低", "失业率", "经济最强", "经济最弱"]

  # --- 时间序列与趋势分析（3 题）---
  - id: "L1-04"
    level: 1
    question: "从2020年到2023年，全国每年的经济总量（GDP）是怎么变化的？是逐年增长还是有所波动？"
    expected_analysis_type: "trend"
    expected_indicators: ["gdp"]
    expected_tables: ["economic_indicator_data"]
    expected_sql: "SELECT 统计年份, SUM(gdp) as total_gdp\nFROM economic_indicator_data\nWHERE 统计年份 BETWEEN '2020' AND '2023'\nGROUP BY 统计年份\nORDER BY 统计年份"
    expected_ranges:
      total_gdp: {min: 0}
      table_rows: {min: 4, max: 4}
    expected_keywords: ["逐年", "增长", "GDP变化", "2020", "2023"]

  - id: "L1-05"
    level: 1
    question: "2023年，全国各季度的人口自然增长率分别是多少？哪个季度增长最快？"
    expected_analysis_type: "detail"
    expected_indicators: ["population_growth_rate"]
    expected_tables: ["population_data"]
    expected_sql: "SELECT quarter, AVG(population_growth_rate) as avg_growth_rate\nFROM population_data\nWHERE 统计年份 = '2023'\nGROUP BY quarter\nORDER BY quarter"
    expected_ranges:
      avg_growth_rate: {min: -10, max: 50}
      table_rows: {min: 1, max: 4}
    expected_keywords: ["季度", "人口自然增长率", "增长最快", "2023年"]

  - id: "L1-06"
    level: 1
    question: "近几年全国的房价走势如何？帮我看看2020年到2023年每年的平均房价变化情况。"
    expected_analysis_type: "trend"
    expected_indicators: ["avg_house_price"]
    expected_tables: ["real_estate_data"]
    expected_sql: "SELECT 统计年份, AVG(avg_house_price) as avg_price\nFROM real_estate_data\nWHERE 统计年份 BETWEEN '2020' AND '2023'\nGROUP BY 统计年份\nORDER BY 统计年份"
    expected_ranges:
      avg_price: {min: 0}
      table_rows: {min: 4, max: 4}
    expected_keywords: ["房价走势", "平均房价", "2020", "2023", "变化"]

