questions:
- id: L1-01
  level: 1
  question: 2023年哪些省份的经济总量最大？帮我列出GDP最高的前3个省份，同时看看它们的人均GDP大概是多少。
  expected_analysis_type: detail
  expected_indicators:
  - gdp
  - per_capita_gdp
  expected_tables:
  - economic_indicator_data
  - admin_region_data
  expected_sql: 'SELECT a.province_name, e.gdp, e.per_capita_gdp

    FROM economic_indicator_data e

    JOIN admin_region_data a ON e.区划ID = a.区划ID

    WHERE e.统计年份 = ''2023''

    ORDER BY e.gdp DESC

    LIMIT 3'
  expected_ranges:
    gdp:
      min: 0
    per_capita_gdp:
      min: 0
    table_rows:
      min: 1
      max: 3
  expected_keywords:
  - GDP最高
  - 前3
  - 人均GDP
  - 2023年
  - 经济总量
- id: L1-02
  level: 1
  question: 我想看看2022年环境比较好的省份是不是森林覆盖率也高。请帮我列出森林覆盖率排前5的省份，同时看看它们的空气质量（AQI）情况。
  expected_analysis_type: detail
  expected_indicators:
  - forest_coverage
  - aqi
  expected_tables:
  - env_monitor_data
  - admin_region_data
  expected_sql: 'SELECT a.province_name, e.forest_coverage, e.aqi

    FROM env_monitor_data e

    JOIN admin_region_data a ON e.区划ID = a.区划ID

    WHERE e.统计年份 = ''2022''

    ORDER BY e.forest_coverage DESC

    LIMIT 5'
  expected_ranges:
    forest_coverage:
      min: 0
    aqi:
      min: 0
    table_rows:
      min: 1
      max: 5
  expected_keywords:
  - 森林覆盖率
  - 前5
  - AQI
  - 空气质量
  - 2022年
- id: L1-03
  level: 1
  question: 2023年，经济最强和最弱的省份，它们的就业情况差别有多大？帮我分别列出GDP最高和最低的3个省份，看看它们的失业率分别是多少。
  expected_analysis_type: detail
  expected_indicators:
  - gdp
  - unemployment_rate
  expected_tables:
  - economic_indicator_data
  - employment_data
  - admin_region_data
  expected_sql: 'SELECT a.province_name, e.gdp, emp.unemployment_rate

    FROM economic_indicator_data e

    JOIN employment_data emp ON e.区划ID = emp.区划ID AND e.统计年份 = emp.统计年份

    JOIN admin_region_data a ON e.区划ID = a.区划ID

    WHERE e.统计年份 = ''2023''

    ORDER BY e.gdp DESC

    LIMIT 3'
  expected_ranges:
    gdp:
      min: 0
    unemployment_rate:
      min: 0
    table_rows:
      min: 1
      max: 6
  expected_keywords:
  - GDP最高
  - GDP最低
  - 失业率
  - 经济最强
  - 经济最弱
- id: L1-04
  level: 1
  question: 从2020年到2023年，全国每年的经济总量（GDP）是怎么变化的？是逐年增长还是有所波动？
  expected_analysis_type: trend
  expected_indicators:
  - gdp
  expected_tables:
  - economic_indicator_data
  expected_sql: 'SELECT 统计年份, SUM(gdp) as total_gdp

    FROM economic_indicator_data

    WHERE 统计年份 BETWEEN ''2020'' AND ''2023''

    GROUP BY 统计年份

    ORDER BY 统计年份'
  expected_ranges:
    total_gdp:
      min: 0
    table_rows:
      min: 4
      max: 4
  expected_keywords:
  - 逐年
  - 增长
  - GDP变化
  - '2020'
  - '2023'
- id: L1-05
  level: 1
  question: 2023年，全国各季度的人口自然增长率分别是多少？哪个季度增长最快？
  expected_analysis_type: detail
  expected_indicators:
  - population_growth_rate
  expected_tables:
  - population_data
  expected_sql: 'SELECT quarter, AVG(population_growth_rate) as avg_growth_rate

